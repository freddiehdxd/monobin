name: ci

on:
  push:
  pull_request:

jobs:
  go:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The Go side is stdlib-only. //go:embed all:app compiles against the
      # committed app/ tree (app/assets/.keep guarantees the dir exists), so the
      # core builds/tests without the island build. NOTE: CI does NOT run the
      # island/Tailwind build (npm) — verify client changes locally with
      # `cd islands && npm run build`.
      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./... # -race needs cgo; ubuntu runners ship gcc

      # Static validation: unregistered islands, dynamic routes missing
      # StaticPaths, loader keys with no route. Exits non-zero on error.
      - name: monobin check
        run: go run . check
